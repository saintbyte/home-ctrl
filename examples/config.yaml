# Home Control Configuration
# Example configuration file for home-ctrl

# Server configuration
server:
  # Host to listen on (default: 127.0.0.1)
  host: "0.0.0.0"
  
  # Port to listen on (default: 8080)
  port: 8080

# Authentication configuration
auth:
  # User credentials (username: password)
  users:
    admin: "admin123"
    user: "user123"
  
  # Session TTL in hours (default: 24)
  session_ttl_hours: 24

# Data directory for SQLite database
data_dir: "data"

# Example of additional configuration sections
# (currently not used, but available for future extensions)
# database:
#   host: "localhost"
#   port: 5432
#   username: "homectrl"
#   password: "secret"

# mqtt:
#   broker: "mqtt://localhost:1883"
#   client_id: "home-ctrl"
#   topics:
#     - "home/#"

# Background tasks (loaded from config)
tasks:
  # Example task - runs every hour
  - name: "cleanup_old_sessions"
    schedule: "0 * * * *"  # cron expression
    enabled: true
    command: "cleanup_sessions"
  
  # Example task - runs daily at midnight
  - name: "daily_backup"
    schedule: "0 0 * * *"
    enabled: false
    command: "backup_data"
  
  # Example task - runs every 5 minutes
  - name: "check_devices"
    schedule: "*/5 * * * *"
    enabled: true
    command: "check_device_status"

# Main view configuration
mainview:
  widgets:
    # Example widget - clock
    - name: "clock"
      params:
        timezone: "UTC"
        format: "24h"
    
    # Example widget - weather
    - name: "weather"
      params:
        location: "Moscow"
        units: "metric"
    
    # Example widget - sensor list
    - name: "sensors"
      params:
        sensors:
          - "temperature_living_room"
          - "temperature_bedroom"
          - "humidity_bathroom"
